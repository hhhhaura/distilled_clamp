seed: 42
device: cuda

paths:
  lakh_midi_root: ${LAKH_MIDI_ROOT}
  anticipation_root: ${CTRLM_REPO}/anticipation
  clamp3_root: ${CTRLM_REPO}/clamp3
  output_root: ${CTRLM_REPO}/ctrlm-ismir/distilled_clamp/outputs_perceiver_fintune
  preprocessed_train_root: ${CTRLM_REPO}/ctrlm-ismir/distilled_clamp/preprocessed/train
  preprocessed_val_root: ${CTRLM_REPO}/ctrlm-ismir/distilled_clamp/preprocessed/val

data:
  midi_glob: "**/*.mid"
  midi_glob_alt: "**/*.midi"
  max_files: 1000000
  max_training_samples: 300000
  val_file_count: 50
  segments_per_file: 10
  rescan_each_epoch: true
  rescan_train_each_epoch: true
  rescan_val_each_epoch: true
  num_workers: 2
  batch_size: 16
  pin_memory: true
  drop_last: false

source:
  vocab_size: 27513
  pad_token_id: 27513
  preproc_chunk_min: 510
  preproc_chunk_max: 1023

teacher:
  clamp_weights_path: ${CTRLM_REPO}/clamp-anti-bridge/weights/weights_clamp3_c2_h_size_768_t_model_FacebookAI_xlm-roberta-base_t_length_128_a_size_768_a_layers_12_a_length_128_s_size_768_s_layers_12_p_size_64_p_length_512.pth

target:
  dim: 768

patching:
  patch_len: 63
  max_patches: 0

input_module:
  type: perceiver
  perceiver_num_latents: 64

rope:
  theta: 10000.0
  max_positions: 4096

model:
  d_model: 768
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.1
  # One of: distilled_head, direct
  m3_alignment: distilled_head
  freeze:
    # LoRA finetune on frozen M3 core.
    enable: true
    lora: qkv
    rank: 16
    alpha: 32.0
    dropout: 0.1

loss:
  # Distill-focused finetune; set lambda_recon > 0 if you want mixed objective.
  lambda_recon: 0.2
  lambda_soft: 1.0
  lambda_rkd: 1.0
  temperature: 0.07
  lambda_smooth: 0.0
  smooth_noise_std: 0.0
  smooth_loss_type: kl
  alignment_threshold: 0.8

optim:
  lr: 5.0e-5
  weight_decay: 1.0e-2
  grad_clip: 1.0
  max_steps: 200000
  use_amp: true
  accumulation_steps: 4
  warmup_steps: 2000
  lr_min: 0.0
  cosine: true

log:
  log_every_steps: 50
  save_every_steps: 1000

# Resume from:
# /home/hhhhaura/dmir_lab/CTRL-M/ctrlm-ismir/distilled_clamp/outputs_perceiver_full/checkpoints/input_perceiver_lat64/best.pt
